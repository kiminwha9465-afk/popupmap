<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${store.name} + ' - 팝업맵'">팝업스토어 상세</title>
    <link rel="stylesheet" href="/css/style.css?v=7"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<header class="header">
<div class="header-inner">
    <!-- 1행: 로고 / 목록으로 / 인증 -->
    <div class="header-top">
        <a href="/" class="header-brand">
            <span class="brand-icon">📍</span>
            <span class="brand-text">팝업맵</span>
        </a>
        <div class="header-top-right">
            <div class="header-right">
                <a href="/stores" class="back-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    목록으로
                </a>
                <div class="header-auth">
                    <span sec:authorize="isAuthenticated()" class="header-user">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                        <span sec:authentication="name"></span>
                    </span>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="auth-link-btn">로그아웃</button>
                    </form>
                    <a sec:authorize="isAnonymous()" href="/login" class="auth-link-btn">로그인</a>
                    <a sec:authorize="isAnonymous()" href="/signup" class="auth-link-btn signup">회원가입</a>
                </div>
            </div>
        </div>
    </div>
    <!-- 2행: 네비게이션 (항상 표시, 모바일에서 가로 스크롤) -->
    <div class="header-nav-row">
        <nav class="header-nav">
            <span class="nav-group-label">팝업</span>
            <a href="/stores" class="nav-link">전체보기</a>
            <a href="/stores?category=패션" class="nav-link nav-cat-item">패션</a>
            <a href="/stores?category=뷰티" class="nav-link nav-cat-item">뷰티</a>
            <a href="/stores?category=식음료" class="nav-link nav-cat-item">식음료</a>
            <a href="/stores?category=라이프스타일" class="nav-link nav-cat-item">라이프스타일</a>
            <a href="/stores?category=아트/문화" class="nav-link nav-cat-item">아트/문화</a>
            <a href="/stores?category=엔터테인먼트" class="nav-link nav-cat-item">엔터테인먼트</a>
            <a href="/stores?category=테크" class="nav-link nav-cat-item">테크</a>
            <details class="nav-dropdown">
                <summary>
                    카테고리
                    <svg class="drop-arrow" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                </summary>
                <div class="nav-dropdown-menu">
                    <a href="/stores?category=패션" class="nav-dropdown-item">패션</a>
                    <a href="/stores?category=뷰티" class="nav-dropdown-item">뷰티</a>
                    <a href="/stores?category=식음료" class="nav-dropdown-item">식음료</a>
                    <a href="/stores?category=라이프스타일" class="nav-dropdown-item">라이프스타일</a>
                    <a href="/stores?category=아트/문화" class="nav-dropdown-item">아트/문화</a>
                    <a href="/stores?category=엔터테인먼트" class="nav-dropdown-item">엔터테인먼트</a>
                    <a href="/stores?category=테크" class="nav-dropdown-item">테크</a>
                </div>
            </details>
            <span class="nav-sep"></span>
            <span class="nav-group-label">소식</span>
            <a href="/news" class="nav-link nav-news-item">전체</a>
            <a href="/news?tag=공지" class="nav-link nav-news-item">공지</a>
            <a href="/news?tag=소식" class="nav-link nav-news-item">소식</a>
            <a href="/news?tag=트렌드" class="nav-link nav-news-item">트렌드</a>
            <a href="/news?tag=후기" class="nav-link nav-news-item">후기</a>
            <details class="nav-dropdown">
                <summary>
                    소식
                    <svg class="drop-arrow" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                </summary>
                <div class="nav-dropdown-menu">
                    <a href="/news" class="nav-dropdown-item">전체</a>
                    <a href="/news?tag=공지" class="nav-dropdown-item">공지</a>
                    <a href="/news?tag=소식" class="nav-dropdown-item">소식</a>
                    <a href="/news?tag=트렌드" class="nav-dropdown-item">트렌드</a>
                    <a href="/news?tag=후기" class="nav-dropdown-item">후기</a>
                </div>
            </details>
        </nav>
    </div>
</div>
</header>

<div class="detail-container">
    <div class="detail-hero" style="margin-top:0">
        <img th:src="${store.imageUrl}" th:alt="${store.name}" class="detail-hero-img"/>
        <div class="detail-hero-overlay">
            <span class="card-category" th:text="${store.category}"></span>
            <span class="card-status"
                  th:text="${store.startDate.isAfter(T(java.time.LocalDate).now()) ? '오픈예정' : '진행중'}"
                  th:classappend="${store.startDate.isAfter(T(java.time.LocalDate).now()) ? ' upcoming' : ' ongoing'}">
            </span>
        </div>
    </div>

    <div class="detail-content">
        <div class="detail-main">
            <div class="detail-brand" th:text="${store.brand}"></div>
            <h1 class="detail-name" th:text="${store.name}"></h1>
            <p class="detail-description" th:text="${store.description}"></p>

            <div class="detail-info-grid">
                <div class="info-item">
                    <div class="info-icon">📅</div>
                    <div>
                        <div class="info-label">운영 기간</div>
                        <div class="info-value" th:text="${store.startDate} + ' ~ ' + ${store.endDate}"></div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🕐</div>
                    <div>
                        <div class="info-label">운영 시간</div>
                        <div class="info-value" th:text="${store.hours}"></div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div>
                        <div class="info-label">위치</div>
                        <div class="info-value" th:text="${store.address}"></div>
                    </div>
                </div>
                <div class="info-item" th:if="${store.website != null}">
                    <div class="info-icon">🔗</div>
                    <div>
                        <div class="info-label">웹사이트</div>
                        <a th:href="${store.website}" th:text="${store.website}"
                           class="info-link" target="_blank" rel="noopener noreferrer"></a>
                    </div>
                </div>
            </div>

            <div class="detail-actions">
                <a th:href="${store.website}" target="_blank" rel="noopener noreferrer"
                   th:if="${store.website != null}" class="btn-primary">
                    공식 사이트 방문
                </a>
                <button class="btn-bookmark" id="detailBmBtn" th:data-id="${store.id}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2" id="detailBmSvg">
                        <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                    </svg>
                    <span id="detailBmText">북마크</span>
                </button>
            </div>
        </div>

        <div class="detail-map-wrap">
            <h2 class="detail-map-title">위치</h2>
            <div id="detail-map"></div>
            <p class="detail-address-text" th:text="${store.address}"></p>
        </div>
    </div>

    <!-- 후기 섹션 -->
    <div class="detail-reviews">
        <div class="detail-reviews-header">
            <div class="detail-reviews-title-wrap">
                <h2 class="detail-reviews-title">방문 후기</h2>
                <span class="detail-reviews-count" th:if="${not #lists.isEmpty(reviews)}"
                      th:text="${reviews.size()} + '건'"></span>
            </div>
            <a th:href="@{/news/write(tag='후기', storeId=${store.id})}"
               sec:authorize="isAuthenticated()"
               class="detail-reviews-write-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                후기 작성
            </a>
        </div>

        <!-- 후기 있음 -->
        <div class="detail-reviews-grid" th:if="${not #lists.isEmpty(reviews)}">
            <a th:each="r, i : ${reviews}" th:if="${i.index < 6}"
               th:href="@{/news/{id}(id=${r.id}, from='후기')}"
               class="detail-review-card">
                <img th:if="${r.thumbnailUrl != null}"
                     th:src="${r.thumbnailUrl}" th:alt="${r.title}"
                     class="detail-review-card-img"/>
                <div class="detail-review-card-content">
                    <div class="detail-review-card-top">
                        <span class="detail-review-quote">"</span>
                        <p class="detail-review-card-title" th:text="${r.title}"></p>
                        <p class="detail-review-card-body"
                           th:text="${#strings.length(r.content) > 80} ? ${#strings.substring(r.content, 0, 80)} + '...' : ${r.content}"></p>
                    </div>
                    <div class="detail-review-card-footer">
                        <span class="detail-review-author" th:text="${r.author}"></span>
                        <span class="detail-review-date"
                              th:text="${#temporals.format(r.publishedAt, 'yyyy.MM.dd')}"></span>
                    </div>
                </div>
            </a>
        </div>
        <div class="detail-reviews-bottom" th:if="${reviews.size() > 6}">
            <a th:href="@{/news(tag='후기')}" class="detail-reviews-more">
                전체 후기 보기 (<span th:text="${reviews.size()}"></span>건) →
            </a>
        </div>

        <!-- 후기 없음 -->
        <div th:if="${#lists.isEmpty(reviews)}" class="detail-reviews-empty">
            <div class="detail-reviews-empty-icon">✏️</div>
            <p class="detail-reviews-empty-title">아직 등록된 후기가 없어요</p>
            <p class="detail-reviews-empty-sub">이 팝업을 방문했다면 첫 번째 후기를 남겨보세요!</p>
            <a th:href="@{/news/write(tag='후기', storeId=${store.id})}"
               sec:authorize="isAuthenticated()"
               class="btn-primary detail-reviews-write-btn">작성하러 가기</a>
            <a href="/login"
               sec:authorize="isAnonymous()"
               class="btn-primary detail-reviews-write-btn">로그인하고 후기 쓰기</a>
        </div>
    </div>
</div>

<script src="/js/nav.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    const storeDetail = {
        lat: /*[[${store.latitude}]]*/ 37.5665,
        lng: /*[[${store.longitude}]]*/ 126.9780,
        name: /*[[${store.name}]]*/ '',
        address: /*[[${store.address}]]*/ ''
    };
</script>
<script src="/js/detail-map.js"></script>
<script th:inline="javascript">
(function() {
    const BKEY = 'popupmap-bookmarks';
    const btn  = document.getElementById('detailBmBtn');
    const svg  = document.getElementById('detailBmSvg');
    const txt  = document.getElementById('detailBmText');
    const id   = String(/*[[${store.id}]]*/ 0);

    function load() {
        try { return JSON.parse(localStorage.getItem(BKEY) || '[]'); } catch { return []; }
    }

    function update() {
        const marked = load().includes(id);
        btn.classList.toggle('bookmarked', marked);
        svg.setAttribute('fill', marked ? 'currentColor' : 'none');
        txt.textContent = marked ? '북마크됨' : '북마크';
    }

    btn.addEventListener('click', () => {
        const bm  = load();
        const idx = bm.indexOf(id);
        if (idx >= 0) bm.splice(idx, 1); else bm.push(id);
        localStorage.setItem(BKEY, JSON.stringify(bm));
        update();
    });

    update();
})();
</script>
</body>
</html>
